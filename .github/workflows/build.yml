name: build

# Thin PR-CI caller for the shared scientist-labs/rust-gem-release build workflow
# (pinned @0.10.0). Supersedes the hand-rolled ci.yml: it compiles the native extension
# and runs the spec suite across the supported Ruby versions, with cache + setup-ruby
# centralized in the reusable workflow.

on: pull_request

jobs:
  build:
    uses: scientist-labs/rust-gem-release/.github/workflows/build.yml@0.11.0
    with:
      test-command: bundle exec rake spec
