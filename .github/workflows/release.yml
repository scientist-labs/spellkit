name: Release

# Thin caller for the shared scientist-labs/rust-gem-release reusable workflow.
# It owns only what an `on: workflow_call` workflow cannot: the tag trigger, the
# contents:write token grant, and spellkit's per-gem inputs/secrets. Every build
# leg (source + arm64-darwin + x86_64-linux + aarch64-linux), SHA pin, and gotcha
# lives once in the shared workflow (pinned @0.11.0). See red-candle's
# release.yml for the proven template.
#
# Release procedure (the tag drives it; a CI-created tag would not re-trigger):
#   1. bump lib/spellkit/version.rb
#   2. git commit -am "Release vX.Y.Z"
#   3. git tag X.Y.Z && git push origin HEAD --tags
#
# Dry-run any time without a tag:
#   gh workflow run release.yml -f publish=false --ref <branch>
#
# Pre-merge full-matrix dry-run: add the `dry-run-release` label to a PR. The
# `labeled` trigger below fires the real release pipeline (publish=false) against
# the PR branch, validating every cross leg before merge. workflow_dispatch can't
# reach a branch-only workflow, so the label is the only pre-merge path.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"        # release:    0.1.2
      - "[0-9]+.[0-9]+.[0-9]+.*"      # prerelease: 0.1.2.pre1, 0.1.2.rc2 (RubyGems dot form)
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+.*"
  workflow_dispatch:
    inputs:
      version:
        type: string
        default: ""
        description: "Version to cut + release, e.g. 1.0.0 (blank = build-only dry-run)"
      publish:
        type: boolean
        default: false
        description: "push to RubyGems (default off = dry-run)"
  pull_request:
    types: [opened, synchronize, reopened, labeled]

# A reusable workflow can only REDUCE the inherited token scope, never elevate it —
# so the caller MUST grant contents: write here (and the repo's default workflow token
# must not be read-only) or `gh release create` 403s.
permissions:
  contents: write

jobs:
  release:
    # Normal PRs must not run the expensive cross matrix — only a PR explicitly
    # labeled `dry-run-release` does. Tag pushes and manual dispatch always run.
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'dry-run-release') }}
    uses: scientist-labs/rust-gem-release/.github/workflows/release.yml@0.11.0
    with:
      # Generic (non-aliasing) adopter: gem-name == ext-name == gemspec basename ==
      # "spellkit", so ext-name / gemspec / platform-gem-env all resolve to their
      # defaults (spellkit, spellkit.gemspec, RUST_GEM_PLATFORM) and are omitted.
      gem-name: spellkit
      version-command: ruby -r./lib/spellkit/version -e 'print SpellKit::VERSION'
      version: ${{ inputs.version }}
      bump-command: |
        sed -i 's/^\( *VERSION *= *\).*/\1"'"$VERSION"'"/' lib/spellkit/version.rb
      # On a tag push -> publish; on manual dispatch -> the input (default false = dry-run).
      # A labeled-PR dry-run is never a publish (the pull_request event has no `inputs`).
      publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
    secrets:
      # required: false in the shared workflow -> an empty token is a clean no-op skip.
      rubygems-api-key: ${{ secrets.RUBYGEMS_API_KEY }}
